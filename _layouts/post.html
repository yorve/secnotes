<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} | SecNotes</title>
    <style>
        body { background: #0a0a0a; color: #c9d1d9; font-family: sans-serif; line-height: 1.6; padding: 40px 20px; }
        .content { max-width: 750px; margin: 0 auto; }
        h1 { color: #fff; border-bottom: 1px solid #222; padding-bottom: 10px; }
        pre { background: #161b22; padding: 15px; overflow-x: auto; border-radius: 5px; border: 1px solid #30363d; }
        code { font-family: monospace; color: #79c0ff; }
        a { color: #58a6ff; }
        .back-link { display: block; margin-bottom: 20px; text-decoration: none; color: #888; font-size: 0.9rem; }
        pre code {
    color: #00ff41; /* Verde neón para comandos */
    font-size: 0.9rem;
            .content img {
    max-width: 100%;
    height: auto;
    display: block;
    margin: 20px auto;
    border-radius: 5px;
    border: 1px solid #30363d;
    box-shadow: 0 4px 10px rgba(0,0,0,0.5); /* Esto le da profundidad a las capturas */
}
}
    </style>
</head>
<body>
    <div class="content">
        <a href="{{ site.baseurl }}/" class="back-link">← Volver al inicio</a>
        <h1>{{ page.title }}</h1>
        {{ content }}
    </div>
</body>
</html>
