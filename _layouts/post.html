<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} | SecNotes</title>
    <style>
        body { background: #0a0a0a; color: #c9d1d9; font-family: sans-serif; line-height: 1.6; padding: 40px 20px; }
        /* AJUSTE PARA ALINEAR TODO A LA IZQUIERDA */
.content { 
    max-width: 900px; /* Un poco más ancho para que los scans de Nmap no se corten */
    margin: 0;        /* Quita el margen centrado */
    padding: 20px 40px; /* Dale aire a la izquierda y derecha */
    text-align: left; /* Asegura que el texto esté a la izquierda */
}

/* Forzar que el título también esté a la izquierda y alineado */
h1 { 
    color: #fff; 
    border-bottom: 1px solid #222; 
    padding-bottom: 10px; 
    margin-top: 0; /* Quita margen extra arriba */
    text-align: left; /* Asegura el título a la izquierda */
}

/* Ajuste de las capturas (que ya está a la izquierda pero le damos profundidad) */
.content img { 
    max-width: 100%; 
    height: auto; 
    border-radius: 5px; 
    border: 1px solid #30363d; 
    box-shadow: 0 4px 10px rgba(0,0,0,0.5); /* Le da profundidad a los scans */
}
}
}
    </style>
</head>
<body>
    <div class="content">
        <a href="{{ site.baseurl }}/" class="back-link">← Volver al inicio</a>
        <h1>{{ page.title }}</h1>
        {{ content }}
    </div>
</body>
</html>
